<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pagination using Js</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 class="heading">Pagination using Js</h1>

    <ul class="pagination-list" data-current-page="1"></ul>
    
    <div class="pagination-container">
      <button class="pagination-btn prev-btn">Previous</button>
      <div class="pagination-numbers"></div>
      <button class="pagination-btn next-btn">Next</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
